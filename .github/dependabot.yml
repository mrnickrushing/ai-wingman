version: 2
updates:
  # npm — root + the `server` and `app` workspaces (single entry; Dependabot
  # resolves the workspace package.json files from the root lockfile).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      # Collapse low-risk bumps into one PR each to cut review noise.
      dev-dependencies:
        dependency-type: development
        update-types: ["major", "minor", "patch"]
      production-minor-patch:
        dependency-type: production
        update-types: ["major", "minor", "patch"]
    labels:
      - dependencies

  # Keep the GitHub Actions used in CI up to date and pinned.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - github-actions
