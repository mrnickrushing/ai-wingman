workflows:
  ios-distribution:
    name: iOS — App Store Distribution
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: com.rushingtechnologies.aiwingman
        XCODE_PROJECT: AIWingman.xcodeproj
        XCODE_WORKSPACE: AIWingman.xcworkspace
        XCODE_SCHEME: AIWingman
        APPLE_TEAM_ID: PH4AKDQ4Q7
      node: 22
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/app/node_modules
    scripts:
      - name: Install npm dependencies
        script: |
          cd app
          npm ci
      - name: Expo prebuild
        script: |
          cd app
          npx expo prebuild --platform ios --clean
      - name: Set bundle version
        script: |
          cd app/ios
          agvtool new-version -all $BUILD_NUMBER
      - name: Install CocoaPods
        script: |
          cd app/ios
          pod install
      - name: Install iOS signing assets
        script: |
          keychain initialize
          echo "$IOS_DISTRIBUTION_CERTIFICATE_B64" | base64 --decode > /tmp/ios_distribution.p12
          security import /tmp/ios_distribution.p12 \
            -k "$CM_KEYCHAIN_PATH" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$CM_KEYCHAIN_PASSWORD" \
            "$CM_KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_APP_STORE_PROVISIONING_PROFILE_B64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/AI_Wingman_App_Store.mobileprovision"
      - name: Write export options
        script: |
          cat > /tmp/aiwingman-export-options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$IOS_PROVISIONING_PROFILE_SPECIFIER</string>
            </dict>
          </dict>
          </plist>
          EOF
      - name: Build iOS archive
        script: |
          cd app/ios
          xcodebuild \
            -workspace $XCODE_WORKSPACE \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/AIWingman.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_SPECIFIER" \
            archive \
            | xcpretty
      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/build/AIWingman.xcarchive \
            -exportOptionsPlist /tmp/aiwingman-export-options.plist \
            -exportPath $CM_BUILD_DIR/build/ipa \
            | xcpretty
    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - External Testers
      email:
        recipients:
          - mrnickrushing@yahoo.com
        notify:
          success: true
          failure: true

  ios-development:
    name: iOS — Development Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: com.rushingtechnologies.aiwingman
        XCODE_PROJECT: AIWingman.xcodeproj
        XCODE_WORKSPACE: AIWingman.xcworkspace
        XCODE_SCHEME: AIWingman
        APPLE_TEAM_ID: PH4AKDQ4Q7
      node: 22
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/app/node_modules
    scripts:
      - name: Install npm dependencies
        script: |
          cd app
          npm ci
      - name: Expo prebuild
        script: |
          cd app
          npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd app/ios
          pod install
      - name: Build iOS (debug)
        script: |
          cd app/ios
          xcodebuild \
            -workspace $XCODE_WORKSPACE \
            -scheme $XCODE_SCHEME \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build \
            | xcpretty
    artifacts:
      - app/ios/build/*.ipa
    publishing:
      email:
        recipients:
          - mrnickrushing@yahoo.com
        notify:
          success: true
          failure: true
