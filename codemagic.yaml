workflows:
  ios-distribution:
    name: iOS — App Store Distribution
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:

      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: com.rushingtechnologies.aiwingman
        XCODE_PROJECT: AIWingman.xcodeproj
        XCODE_WORKSPACE: AIWingman.xcworkspace
        XCODE_SCHEME: AIWingman
        APPLE_TEAM_ID: PH4AKDQ4Q7
        EXPO_PUBLIC_SERVER_URL: wss://wingman-server-production-5146.up.railway.app/ws
        EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: 3252464813-d766karmag0gu0ul1tan5125a82nnjar.apps.googleusercontent.com
        EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 3252464813-f3ki3imith7n3aomtnvknlismga84ba0.apps.googleusercontent.com
        EXPO_PUBLIC_REVENUECAT_ENTITLEMENT_ID: pro
        EXPO_PUBLIC_REVENUECAT_PACKAGE_ID: "$rc_monthly"
        EXPO_PUBLIC_REVENUECAT_IOS_API_KEY: appl_OttrUHeiQVFAqpgoQyuUyYGTHzH
        # Crash reporting (Sentry project: rushing-technologies/ai-wingman).
        EXPO_PUBLIC_SENTRY_DSN: "https://fcea115a48c05ac7377b5f1ea7a1a83f@o4511441604313088.ingest.us.sentry.io/4511565514735616"
        EXPO_UPDATE_CHANNEL: production
      node: 22
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/node_modules
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Expo prebuild
        script: |
          cd app
          npx expo prebuild --platform ios --clean
      - name: Patch Podfile — disable Sentry session replay
        script: |
          # RNSentryReplayUnmask.mm / RNSentryReplay.mm do not compile against the
          # Xcode 26 / iOS 26 SDK. Prepend the Ruby variable that tells the
          # @sentry/react-native podspec to skip the replay subspec.
          PODFILE=app/ios/Podfile
          if ! grep -q 'RNSentryExcludeSessionReplay' "$PODFILE"; then
            { printf '$RNSentryExcludeSessionReplay = true\n'; cat "$PODFILE"; } > /tmp/Podfile_patched
            mv /tmp/Podfile_patched "$PODFILE"
          fi
          echo "Podfile first line: $(head -1 $PODFILE)"
      - name: Set bundle version
        script: |
          cd app/ios
          agvtool new-version -all $BUILD_NUMBER
      - name: Install CocoaPods
        script: |
          cd app/ios
          pod install
      - name: Install iOS signing assets
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --platform IOS \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build and export IPA
        script: |
          set -o pipefail
          mkdir -p /tmp/xcodebuild_logs $CM_BUILD_DIR/build/ipa
          xcode-project build-ipa \
            --workspace app/ios/$XCODE_WORKSPACE \
            --scheme $XCODE_SCHEME \
            --config Release \
            --archive-directory $CM_BUILD_DIR/build \
            --ipa-directory $CM_BUILD_DIR/build/ipa \
            2>&1 | tee /tmp/xcodebuild_logs/build.log
    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - External Testers
      email:
        recipients:
          - mrnickrushing@yahoo.com
        notify:
          success: true
          failure: true

  ios-development:
    name: iOS — Development Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:

      vars:
        BUNDLE_ID: com.rushingtechnologies.aiwingman
        XCODE_PROJECT: AIWingman.xcodeproj
        XCODE_WORKSPACE: AIWingman.xcworkspace
        XCODE_SCHEME: AIWingman
        APPLE_TEAM_ID: PH4AKDQ4Q7
        EXPO_PUBLIC_SERVER_URL: wss://wingman-server-production-5146.up.railway.app/ws
        EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: 3252464813-d766karmag0gu0ul1tan5125a82nnjar.apps.googleusercontent.com
        EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 3252464813-f3ki3imith7n3aomtnvknlismga84ba0.apps.googleusercontent.com
        EXPO_PUBLIC_REVENUECAT_ENTITLEMENT_ID: pro
        EXPO_PUBLIC_REVENUECAT_PACKAGE_ID: "$rc_monthly"
        EXPO_PUBLIC_REVENUECAT_IOS_API_KEY: appl_OttrUHeiQVFAqpgoQyuUyYGTHzH
        # Crash reporting (Sentry project: rushing-technologies/ai-wingman).
        EXPO_PUBLIC_SENTRY_DSN: "https://fcea115a48c05ac7377b5f1ea7a1a83f@o4511441604313088.ingest.us.sentry.io/4511565514735616"
        EXPO_UPDATE_CHANNEL: production
      node: 22
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/node_modules
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Expo prebuild
        script: |
          cd app
          npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd app/ios
          pod install
      - name: Build iOS (debug)
        script: |
          cd app/ios
          xcodebuild \
            -workspace $XCODE_WORKSPACE \
            -scheme $XCODE_SCHEME \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build \
            | xcpretty
    artifacts:
      - app/ios/build/*.ipa
    publishing:
      email:
        recipients:
          - mrnickrushing@yahoo.com
        notify:
          success: true
          failure: true

  expo-ota-production:
    name: Expo OTA — Production
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      groups:
        - appstore_credentials
      vars:
        EXPO_PUBLIC_SERVER_URL: wss://wingman-server-production-5146.up.railway.app/ws
        EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: 3252464813-d766karmag0gu0ul1tan5125a82nnjar.apps.googleusercontent.com
        EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 3252464813-f3ki3imith7n3aomtnvknlismga84ba0.apps.googleusercontent.com
        EXPO_PUBLIC_REVENUECAT_ENTITLEMENT_ID: pro
        EXPO_PUBLIC_REVENUECAT_PACKAGE_ID: "$rc_monthly"
        EXPO_PUBLIC_REVENUECAT_IOS_API_KEY: appl_OttrUHeiQVFAqpgoQyuUyYGTHzH
        # Crash reporting (Sentry project: rushing-technologies/ai-wingman).
        EXPO_PUBLIC_SENTRY_DSN: "https://fcea115a48c05ac7377b5f1ea7a1a83f@o4511441604313088.ingest.us.sentry.io/4511565514735616"
        EXPO_UPDATE_CHANNEL: production
      node: 22
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Publish Expo update
        script: |
          cd app
          npx eas-cli update \
            --branch production \
            --platform ios \
            --environment production \
            --non-interactive \
            --message "Codemagic OTA $CM_BUILD_ID"
    publishing:
      email:
        recipients:
          - mrnickrushing@yahoo.com
        notify:
          success: true
          failure: true
