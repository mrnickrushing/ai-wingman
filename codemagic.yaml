workflows:
  ios-distribution:
    name: iOS — App Store Distribution
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: com.rushingtechnologies.aiwingman
        XCODE_PROJECT: AIWingman.xcodeproj
        XCODE_WORKSPACE: AIWingman.xcworkspace
        XCODE_SCHEME: AIWingman
        APPLE_TEAM_ID: PH4AKDQ4Q7
      node: 22
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/app/node_modules
    scripts:
      - name: Install npm dependencies
        script: |
          cd app
          npm ci
      - name: Expo prebuild
        script: |
          cd app
          npx expo prebuild --platform ios --clean
      - name: Set bundle version
        script: |
          cd app/ios
          agvtool new-version -all $BUILD_NUMBER
      - name: Install CocoaPods
        script: |
          cd app/ios
          pod install
      - name: Install iOS signing assets
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --platform IOS \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build and export IPA
        script: |
          set -o pipefail
          mkdir -p /tmp/xcodebuild_logs $CM_BUILD_DIR/build/ipa
          xcode-project build-ipa \
            --workspace app/ios/$XCODE_WORKSPACE \
            --scheme $XCODE_SCHEME \
            --config Release \
            --archive-directory $CM_BUILD_DIR/build \
            --ipa-directory $CM_BUILD_DIR/build/ipa \
            2>&1 | tee /tmp/xcodebuild_logs/build.log
      - name: Publish OTA update
        script: |
          cd app
          npx eas-cli update \
            --channel production \
            --message "Build $BUILD_NUMBER from branch $CM_BRANCH" \
            --non-interactive
    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - External Testers
      email:
        recipients:
          - mrnickrushing@yahoo.com
        notify:
          success: true
          failure: true

  ios-development:
    name: iOS — Development Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: com.rushingtechnologies.aiwingman
        XCODE_PROJECT: AIWingman.xcodeproj
        XCODE_WORKSPACE: AIWingman.xcworkspace
        XCODE_SCHEME: AIWingman
        APPLE_TEAM_ID: PH4AKDQ4Q7
      node: 22
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/app/node_modules
    scripts:
      - name: Install npm dependencies
        script: |
          cd app
          npm ci
      - name: Expo prebuild
        script: |
          cd app
          npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd app/ios
          pod install
      - name: Build iOS (debug)
        script: |
          cd app/ios
          xcodebuild \
            -workspace $XCODE_WORKSPACE \
            -scheme $XCODE_SCHEME \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build \
            | xcpretty
    artifacts:
      - app/ios/build/*.ipa
    publishing:
      email:
        recipients:
          - mrnickrushing@yahoo.com
        notify:
          success: true
          failure: true

  ota-update:
    name: OTA Update (EAS)
    max_build_duration: 20
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      node: 22
    scripts:
      - name: Install npm dependencies
        script: |
          cd app
          npm install
      - name: Publish OTA update
        script: |
          cd app
          npx eas-cli update \
            --channel production \
            --message "OTA: $CM_COMMIT" \
            --non-interactive
    publishing:
      email:
        recipients:
          - mrnickrushing@yahoo.com
        notify:
          success: true
          failure: true
